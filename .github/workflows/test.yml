name: CI

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install docker-compose

      - name: Launch Milvus and Redis
        run: |
          docker compose up -d
          echo "Waiting for Milvus container to become healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' milvus_local || echo 'null')
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "Milvus is healthy!"
              break
            fi
            echo "Milvus not yet healthy, retry in 2s..."
            sleep 2
          done

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest 